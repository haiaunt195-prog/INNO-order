<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>INNO Internal Order</title>

<style>

body{
  font-family:Arial;
  background:#f5f5f5;
  padding:20px;
}

.container{
  max-width:700px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:20px;
}

.product{
  border:1px solid #ddd;
  border-radius:12px;
  padding:20px;
  margin-bottom:20px;
}

.qty{
  width:100px;
  padding:10px;
}

.total{
  font-size:30px;
  font-weight:bold;
  margin-top:30px;
}

button{
  width:100%;
  padding:15px;
  background:black;
  color:white;
  border:none;
  border-radius:12px;
  font-size:18px;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:15px;
}

</style>

</head>

<body>

<div class="container">

<h1>
INNO Thanh lý nội bộ
</h1>

<input
id="employeeName"
placeholder="Tên nhân viên">

<input
id="company"
placeholder="Công ty">

<input
id="phone"
placeholder="Số điện thoại">

<div class="product">

<h3>
InnoFans Handheld
</h3>

<p>B010 - 209,400đ</p>

White
<input
class="qty"
type="number"
id="B010_White"
value="0">

Pink
<input
class="qty"
type="number"
id="B010_Pink"
value="0">

Black
<input
class="qty"
type="number"
id="B010_Black"
value="0">

</div>

<div class="product">

<h3>
Innoyo Fan Air
</h3>

<p>B015 - 239,400đ</p>

White
<input
class="qty"
type="number"
id="B015_White"
value="0">

Pink
<input
class="qty"
type="number"
id="B015_Pink"
value="0">

Black
<input
class="qty"
type="number"
id="B015_Black"
value="0">

</div>

<div class="total">

Tổng tiền:
<span id="total">
0
</span>
VNĐ

</div>

<br>

<h3>
QR Thanh toán
</h3>

<img
id="qr"
width="250">

<br><br>

<input
id="paymentProof"
placeholder="Link bill Google Drive">

<button onclick="submitOrder()">
Submit Order
</button>

</div>

<script>

const prices = {

  B010_White:209400,
  B010_Pink:209400,
  B010_Black:209400,

  B015_White:239400,
  B015_Pink:239400,
  B015_Black:239400

};

function calculateTotal(){

  let total = 0;

  Object.keys(prices)
  .forEach(id=>{

    const qty =
      Number(
        document.getElementById(id).value
      );

    total += qty * prices[id];

  });

  document
    .getElementById("total")
    .innerText =
    total.toLocaleString();

  document
    .getElementById("qr")
    .src =

`https://img.vietqr.io/image/970422-123456789-compact2.png?amount=${total}&addInfo=INNO`;

}

document
.querySelectorAll(".qty")
.forEach(input=>{

  input.addEventListener(
    "input",
    calculateTotal
  );

});

calculateTotal();

async function submitOrder(){

  const payload = {

    employeeName:
      document.getElementById("employeeName").value,

    company:
      document.getElementById("company").value,

    phone:
      document.getElementById("phone").value,

    paymentProof:
      document.getElementById("paymentProof").value,

    total:
      document.getElementById("total").innerText

  };

  Object.keys(prices)
  .forEach(id=>{

    payload[id] =
      document.getElementById(id).value;

  });

  await fetch(
    "https://script.google.com/macros/s/AKfycbz0HeVbyzDNWWMI4FnbjV--LSq3G-KqH6Og02gqzHS6cXSCqy2oHlr4458qsdElr4M0mg/exec",
    {
      method:"POST",
      body: JSON.stringify(payload)
    }
  );

  alert("Order submitted!");

}

</script>

</body>
</html>
