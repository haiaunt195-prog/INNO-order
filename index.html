<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>INNO ƯU ĐÃI NỘI BỘ</title>

<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
margin:0;
padding:20px;
background:#f5f5f5;
color:#111;
}

.container{
max-width:900px;
margin:auto;
background:#fff;
padding:40px;
border-radius:20px;
box-shadow:0 2px 15px rgba(0,0,0,.08);
}

.logo-wrap{
text-align:center;
margin-bottom:10px;
}

.logo-wrap img{
height:140px;
object-fit:contain;
}

h1{
text-align:center;
font-size:46px;
margin-top:10px;
margin-bottom:40px;
font-weight:800;
}

label{
display:block;
margin-top:22px;
margin-bottom:8px;
font-weight:700;
font-size:15px;
}

.required{
color:red;
}

input[type="text"],
input[type="email"],
input[type="tel"],
textarea{
width:100%;
padding:14px;
border:1px solid #ccc;
border-radius:12px;
font-size:16px;
}

textarea{
min-height:100px;
resize:vertical;
}

.products{
margin-top:20px;
}

.product-card{
border:1px solid #e3e3e3;
border-radius:18px;
padding:22px;
margin-bottom:20px;
background:#fafafa;
}

.product-header{
display:flex;
align-items:flex-start;
gap:14px;
}

.product-checkbox{
margin-top:6px;
transform:scale(1.3);
}

.product-info{
flex:1;
}

.product-title{
font-size:22px;
font-weight:700;
line-height:1.4;
}

.product-price{
margin-top:6px;
font-size:18px;
color:#444;
font-weight:600;
}

.hidden{
display:none;
}

.color-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:18px;
margin-top:20px;
}

.color-item{
display:flex;
flex-direction:column;
gap:8px;
}

.color-item span{
font-size:15px;
font-weight:700;
}

.color-item input{
padding:12px;
border:1px solid #ccc;
border-radius:12px;
font-size:15px;
}

.total{
text-align:center;
font-size:56px;
font-weight:800;
margin-top:50px;
}

.qr-title{
text-align:center;
font-size:32px;
font-weight:800;
margin-top:50px;
margin-bottom:25px;
}

.qr-box{
text-align:center;
}

.qr-box img{
width:500px;
max-width:100%;
border-radius:24px;
box-shadow:0 2px 15px rgba(0,0,0,.08);
}

.qr-note{
text-align:center;
margin-top:20px;
font-size:16px;
color:#555;
}

.file-upload{
margin-top:20px;
}

button{
width:100%;
margin-top:35px;
padding:18px;
border:none;
border-radius:14px;
background:#000;
color:#fff;
font-size:20px;
font-weight:700;
cursor:pointer;
transition:.2s;
}

button:hover{
opacity:.9;
}

@media(max-width:768px){

.container{
padding:24px;
}

h1{
font-size:34px;
}

.total{
font-size:40px;
}

.qr-title{
font-size:26px;
}

.product-title{
font-size:18px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="logo-wrap">
<img
src="https://raw.githubusercontent.com/haiaunt195-prog/INNO-order/main/logo-inno-black.png"
alt="INNO Logo"
/>
</div>

<h1>ƯU ĐÃI NỘI BỘ</h1>

<form id="orderForm">

<label>
Họ và tên <span class="required">*</span>
</label>
<input required type="text" id="fullName">

<label>
Email của bạn (mail dùng tại công ty) <span class="required">*</span>
</label>
<input required type="email" id="email">

<label>
Công ty <span class="required">*</span>
</label>
<input required type="text" id="company">

<label>
Mã NV <span class="required">*</span>
</label>
<input required type="text" id="employeeCode">

<label>
Số điện thoại liên hệ <span class="required">*</span>
</label>
<input required type="tel" id="phone">

<label>
Note <span class="required">*</span>
</label>
<textarea required id="note"></textarea>

<label>
Sản phẩm muốn mua <span class="required">*</span>
</label>

<div class="products" id="products"></div>

<div class="total" id="total">
Tổng tiền: 0 VNĐ
</div>

<div class="qr-title">
QR Thanh toán
</div>

<div class="qr-box">
<img src="./a93db73a6b1d45faa4785ad8c31b863f.png">
</div>

<div class="qr-note">
Vui lòng chuyển đúng số tiền và upload bill chuyển khoản bên dưới.
</div>

<label class="file-upload">
Upload bill chuyển khoản <span class="required">*</span>
</label>

<input
required
type="file"
id="paymentImage"
accept="image/*"
/>

<button type="submit">
Gửi đơn hàng
</button>

</form>

</div>

<script>

const GOOGLE_SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbz0HeVbyzDNWWMI4FnbjV--LSq3G-KqH6Og02gqzHS6cXSCqy2oHlr4458qsdElr4M0mg/exec";

const CLOUDINARY_CLOUD_NAME = "ddpsybbri";
const CLOUDINARY_UPLOAD_PRESET = "inno_upload";

const products = [

{
code:"INNO-B001",
name:"InnoFans Handheld",
price:200000,
colors:["Bạc","Đen","Vàng"]
},

{
code:"INNO-015",
name:"Innoyo Fan Air",
price:250000,
colors:["Hồng","Trắng","Tím"]
},

{
code:"INNO-B003",
name:"InnoFans Ice",
price:210000,
colors:["Trắng","Tím","Hồng"]
},

{
code:"INNO-B009",
name:"InnoFans Ice Pro",
price:270000,
colors:["Xám","Vàng","Đen"]
},

{
code:"INNO-B008",
name:"Innoyo Water Flosser",
price:470000,
colors:["Hồng","Xanh"]
},

{
code:"INNO-B007",
name:"InnoCare Water Flosser Pocket",
price:500000,
colors:["Trắng"]
},

{
code:"INNO-A004",
name:"Sạc dự phòng Power Wired 10000mAh",
price:250000,
colors:["Trắng","Tím","Xanh"]
},

{
code:"INNO-C001",
name:"Máy rửa xe cầm tay InnoCare Cordless Washer Gun",
price:599000,
colors:["Default"]
},

{
code:"P-PG-005",
name:"Tay cầm chụp ảnh",
price:600000,
colors:["Default"]
},

{
code:"P-PG-012",
name:"Đèn trợ sáng điện thoại PGYTECH",
price:270000,
colors:["Default"]
},

{
code:"INNO-B012",
name:"Máy Sấy Tóc Innoyo Plasma Lite",
price:660000,
colors:["Hồng","Trắng"]
},

{
code:"INNO-B014",
name:"Máy Sấy Tóc Innoyo Plasma",
price:900000,
colors:["Hồng","Tím","Trắng"]
},

{
code:"INNO-B013",
name:"Máy sấy tóc INNOYO Plasma AI",
price:1380000,
colors:["Gold"]
}

];

const productsDiv =
document.getElementById("products");

products.forEach(p=>{

const card =
document.createElement("div");

card.className = "product-card";

card.innerHTML = `

<div class="product-header">

<input
class="product-checkbox"
type="checkbox"
id="${p.code}"
onchange="toggleProduct('${p.code}')"
/>

<div class="product-info">

<div class="product-title">
${p.code} - ${p.name}
</div>

<div class="product-price">
${p.price.toLocaleString()}đ
</div>

</div>

</div>

<div
class="hidden"
id="block_${p.code}"
>

<div class="color-grid">

${p.colors.map(color=>`

<div class="color-item">

<span>${color}</span>

<input
type="number"
min="0"
value="0"
placeholder="Nhập số lượng"
id="${p.code}_${color}"
oninput="calculateTotal()"
/>

</div>

`).join("")}

</div>

</div>

`;

productsDiv.appendChild(card);

});

function toggleProduct(code){

const block =
document.getElementById(`block_${code}`);

const checkbox =
document.getElementById(code);

if(checkbox.checked){

block.classList.remove("hidden");

}else{

block.classList.add("hidden");

}

calculateTotal();

}

function calculateTotal(){

let total = 0;

products.forEach(p=>{

const checked =
document.getElementById(p.code).checked;

if(!checked) return;

p.colors.forEach(color=>{

const qty =
parseInt(
document.getElementById(
`${p.code}_${color}`
).value || 0
);

total += qty * p.price;

});

});

document.getElementById("total")
.innerText =
`Tổng tiền: ${total.toLocaleString()} VNĐ`;

}

async function uploadToCloudinary(file){

const formData = new FormData();

formData.append("file", file);

formData.append(
"upload_preset",
CLOUDINARY_UPLOAD_PRESET
);

const response = await fetch(

`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`,

{
method:"POST",
body:formData
}

);

const data = await response.json();

return data.secure_url;

}

document.getElementById("orderForm")
.addEventListener("submit", async(e)=>{

e.preventDefault();

const button =
document.querySelector("button");

button.disabled = true;
button.innerText = "Đang gửi đơn...";

try{

const fullName =
document.getElementById("fullName").value;

const email =
document.getElementById("email").value;

const company =
document.getElementById("company").value;

const employeeCode =
document.getElementById("employeeCode").value;

const phone =
document.getElementById("phone").value;

const note =
document.getElementById("note").value;

const paymentFile =
document.getElementById("paymentImage")
.files[0];

alert("Đang upload bill...");

const paymentImage =
await uploadToCloudinary(paymentFile);

const items = [];

products.forEach(p=>{

const checked =
document.getElementById(p.code).checked;

if(!checked) return;

let hasQty = false;

p.colors.forEach(color=>{

const qty =
parseInt(
document.getElementById(
`${p.code}_${color}`
).value || 0
);

if(qty > 0){

hasQty = true;

items.push({

product:p.name,
color,
qty,
price:p.price,
total:qty * p.price

});

}

});

if(!hasQty){

alert(
`Sản phẩm "${p.name}" chưa nhập số lượng nên sẽ không được tính vào đơn hàng.`
);

}

});

if(items.length === 0){

alert(
"Vui lòng chọn ít nhất 1 sản phẩm có số lượng hợp lệ."
);

button.disabled = false;
button.innerText = "Gửi đơn hàng";

return;

}

const payload = {

fullName,
email,
company,
employeeCode,
phone,
note,

total:
document.getElementById("total")
.innerText
.replace(/[^\d]/g,""),

paymentImage,

items

};

await fetch(
GOOGLE_SCRIPT_URL,
{
method:"POST",
body:JSON.stringify(payload)
}
);

alert("Đặt hàng thành công!");

location.reload();

}catch(err){

console.error(err);

alert("Có lỗi xảy ra.");

button.disabled = false;
button.innerText = "Gửi đơn hàng";

}

});

</script>

</body>
</html>
